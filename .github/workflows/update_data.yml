name: BLS Verisini Güncelle

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: BLS'ten veriyi çek ve SQLite'a yaz
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: python -m src.update_data --years 15

      - name: Değişiklik varsa commit ve push yap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/employment.db
          if git diff --staged --quiet; then
            echo "Veri değişmedi, commit atılmıyor."
          else
            git commit -m "Otomatik veri güncellemesi $(date -u +%Y-%m-%d)"
            git push
          fi
